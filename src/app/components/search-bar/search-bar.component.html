<form class="search-container" (ngSubmit)="onSubmit()">
  <div class="w-full mb-8 flex justify-center">
    <div class="relative w-full max-w-2xl flex items-center bg-white rounded overflow-hidden shadow-sm border border-gray-200">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-4 text-gray-400">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (ngModelChange)="onSearchInput($event)"
        placeholder="Search for a city..." 
        name="searchQuery"
        autocomplete="off"
        class="w-full py-4 pl-12 pr-4 border-none bg-transparent text-gray-800 text-base outline-none placeholder-gray-400"
      />
      <button type="submit" class="bg-[#eb6e4b] text-white border-none py-4 px-8 font-semibold cursor-pointer transition-colors duration-200 hover:bg-[#d35400] h-full">
        Search
      </button>
    </div>
  </div>
</form>
