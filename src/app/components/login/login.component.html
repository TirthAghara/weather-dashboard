<div class="flex items-center justify-center min-h-screen bg-gray-100 p-4">
  <div class="w-full max-w-md p-10 bg-white border border-gray-200 shadow-md rounded-lg text-center animate-fadeIn">
    <div class="mb-8">
      <h1 class="text-4xl font-extrabold tracking-tight text-gray-800 mb-2">Weather<span class="text-[#eb6e4b]">Dash</span></h1>
      <p class="text-gray-500 m-0">Please enter the password to access the dashboard</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <div class="relative flex items-center">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Enter password..." 
          class="w-full py-4 pl-4 pr-12 rounded bg-white border border-gray-200 text-gray-800 text-base outline-none transition-colors duration-300 focus:border-[#eb6e4b]"
          autocomplete="current-password"
        />
        <button type="button" class="absolute right-4 bg-transparent border-none text-gray-500 cursor-pointer flex items-center justify-center p-1 rounded-full transition-colors duration-300 hover:text-gray-800" (click)="togglePasswordVisibility()">
          <!-- Eye Icon -->
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <!-- Eye Off Icon -->
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      
      <div class="text-red-500 bg-red-100 p-3 rounded text-sm" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="bg-[#eb6e4b] text-white border-none rounded py-4 text-lg font-semibold cursor-pointer transition-colors duration-200 hover:bg-[#d35400] active:translate-y-px">Login</button>
    </form>
  </div>
</div>
