<div class="fixed top-0 left-0 w-full h-1 bg-transparent z-50" *ngIf="loading()">
  <div class="h-full bg-blue-500 w-full animate-progress" style="animation: progress 2s ease-in-out infinite;"></div>
</div>

<app-navbar></app-navbar>

<main class="min-h-screen px-4 py-8 flex justify-center bg-gray-100">
  <div class="w-full max-w-5xl">

    <app-search-bar (search)="searchWeather($event)"></app-search-bar>

    <div *ngIf="error()" class="bg-red-50 border border-red-200 p-6 rounded-lg text-center mb-8 shadow-sm">
      <h3 class="text-red-500 text-xl font-semibold mb-2">Oops! Something went wrong.</h3>
      <p class="text-gray-700 mb-6">{{ error() }}</p>
      <button class="bg-yellow-500 text-white border-none py-3 px-8 rounded font-bold cursor-pointer hover:bg-yellow-600 transition-colors shadow-sm" (click)="retrySearch()">Retry Request</button>
    </div>

    <!-- Responsive Async Placeholders -->
    <div *ngIf="loading() && !currentWeather" class="w-full max-w-5xl mx-auto flex flex-col gap-8">
      <div class="h-64 bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 bg-[length:200%_100%] animate-pulse rounded"></div>
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
        <div class="h-32 bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 bg-[length:200%_100%] animate-pulse rounded" *ngFor="let i of [1,2,3,4,5,6,7]"></div>
      </div>
    </div>

    <div *ngIf="!loading() && !error() && currentWeather as weatherData" class="w-full">
      <app-current-weather 
        [weather]="weatherData">
      </app-current-weather>

      <div *ngIf="forecast as forecastData">
        <app-weather-chart
          [forecast]="forecastData">
        </app-weather-chart>

        <app-forecast 
          [forecast]="forecastData">
        </app-forecast>
      </div>

      <app-weather-map
        [lat]="weatherData.coord.lat"
        [lon]="weatherData.coord.lon">
      </app-weather-map>
    </div>
  </div>
</main>

<style>
@keyframes progress {
  0% { width: 0%; transform: translateX(0); }
  50% { width: 50%; transform: translateX(50%); }
  100% { width: 100%; transform: translateX(100%); }
}
</style>
